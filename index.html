<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/shield.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04060c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>PC-AP Simulados — Polícia Civil do Amapá</title>
    <style>
      /* ══════════════════════════════════════════════════════════
         POLÍCIA CIVIL DO AMAPÁ — SISTEMA DE SIMULADOS
         Paleta: Preto Premium · Grafite · Dourado Policial
      ══════════════════════════════════════════════════════════ */
      :root {
        --bg:          #04060c;
        --bg2:         #060a14;
        --bg3:         #081020;
        --surface:     #0a1422;
        --surface2:    #0d1a2c;
        --card:        #0c1828;
        --card2:       #0e1e34;
        --border:      rgba(200,167,93,0.16);
        --border2:     rgba(200,167,93,0.28);
        --gold:        #c8a75d;
        --gold2:       #dfc07a;
        --gold3:       #a8873d;
        --gold-glow:   rgba(200,167,93,0.10);
        --silver:      #8fa5bf;
        --silver2:     #b0c4d8;
        --graphite:    #4a5a6a;
        --text1:       #edf2f7;
        --text2:       #8fa5bf;
        --text3:       #4a6078;
        --font-h:      'Barlow Condensed','Rajdhani',system-ui,sans-serif;
        --font-b:      'Barlow',system-ui,sans-serif;
        --font-m:      'JetBrains Mono','Courier New',monospace;
      }

      *,*::before,*::after{box-sizing:border-box}
      html,body,#root{min-height:100vh;margin:0;padding:0}

      body{
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 70% 40% at 50% 0%,rgba(12,30,60,0.6) 0%,transparent 70%),
          repeating-linear-gradient(-55deg,
            rgba(255,255,255,0.008) 0px,rgba(255,255,255,0.008) 1px,
            transparent 1px,transparent 9px);
        color:var(--text1);
        font-family:var(--font-b);
        font-size:14px;
        line-height:1.5;
        -webkit-font-smoothing:antialiased;
      }

      /* Scrollbar */
      ::-webkit-scrollbar{width:5px;background:var(--bg)}
      ::-webkit-scrollbar-thumb{background:rgba(200,167,93,0.22);border-radius:3px}
      ::-webkit-scrollbar-thumb:hover{background:rgba(200,167,93,0.4)}

      /* ══ NAVBAR ══ */
      .nav-root{
        background:linear-gradient(90deg,#020409 0%,#040816 40%,#040816 60%,#020409 100%);
        border-bottom:1px solid rgba(200,167,93,0.18);
        box-shadow:0 1px 20px rgba(0,0,0,0.7),0 0 0 1px rgba(0,0,0,0.5);
        position:relative;
      }
      .nav-root::after{
        content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
        background:linear-gradient(90deg,transparent 0%,rgba(200,167,93,0.4) 30%,rgba(200,167,93,0.4) 70%,transparent 100%);
      }
      .nav-label{
        font-family:var(--font-m);font-size:8.5px;font-weight:700;
        letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:.9;
      }
      .nav-brand{
        font-family:var(--font-h);font-size:15px;font-weight:700;
        letter-spacing:1.5px;color:var(--text1);line-height:1;
      }
      .nav-btn{
        background:transparent;border:none;cursor:pointer;padding:7px 13px;
        border-radius:7px;display:flex;flex-direction:column;align-items:center;
        gap:2px;font-family:var(--font-m);font-size:9px;font-weight:700;
        letter-spacing:1.5px;text-transform:uppercase;
        transition:all .2s;color:var(--text3);
      }
      .nav-btn:hover{background:rgba(200,167,93,0.06);color:var(--silver)}
      .nav-btn.active{color:var(--gold)}
      .nav-btn.active::after{
        content:'';display:block;width:20px;height:2px;border-radius:1px;
        background:var(--gold);margin-top:2px;box-shadow:0 0 8px var(--gold-glow);
      }

      /* ══ CARDS ══ */
      .card{
        background:linear-gradient(145deg,var(--card) 0%,var(--card2) 100%);
        border:1px solid var(--border);border-radius:14px;
        box-shadow:0 4px 24px rgba(0,0,0,0.45),0 1px 0 rgba(200,167,93,0.07) inset;
        position:relative;overflow:hidden;transition:all .25s ease;
      }
      .card::before{
        content:'';position:absolute;top:0;left:0;right:0;height:1px;
        background:linear-gradient(90deg,transparent,rgba(200,167,93,0.25),transparent);
      }
      .card:hover{
        border-color:rgba(200,167,93,0.32);
        box-shadow:0 8px 36px rgba(0,0,0,0.55),0 0 0 1px rgba(200,167,93,0.05);
        transform:translateY(-1px);
      }

      /* ══ BOTÕES ══ */
      .btn{
        padding:9px 18px;border-radius:9px;border:none;font-weight:700;cursor:pointer;
        font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;
        font-family:var(--font-h);transition:all .2s cubic-bezier(.4,0,.2,1);
      }
      .btn-gold{
        background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 50%,var(--gold2) 100%);
        color:#04060c;box-shadow:0 4px 16px rgba(200,167,93,0.28);
      }
      .btn-gold:hover{filter:brightness(1.1);box-shadow:0 6px 24px rgba(200,167,93,0.4);transform:translateY(-1px)}
      .btn-outline{
        background:rgba(200,167,93,0.06);color:var(--gold2);
        border:1px solid rgba(200,167,93,0.25);
      }
      .btn-outline:hover{background:rgba(200,167,93,0.12);border-color:rgba(200,167,93,0.4)}
      .btn-ghost{
        background:rgba(255,255,255,0.04);color:var(--silver);
        border:1px solid rgba(255,255,255,0.07);
      }
      .btn-ghost:hover{background:rgba(255,255,255,0.07)}
      .btn-danger{
        background:rgba(180,30,30,0.1);color:#f87171;
        border:1px solid rgba(180,30,30,0.25);
      }

      /* ══ BADGES & LABELS ══ */
      .badge-gold{
        background:rgba(200,167,93,0.1);border:1px solid rgba(200,167,93,0.28);
        color:var(--gold2);font-family:var(--font-m);font-size:9px;
        font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:4px;
      }
      .section-label{
        font-family:var(--font-m);font-size:9px;font-weight:700;
        letter-spacing:3.5px;color:var(--gold);text-transform:uppercase;
        display:flex;align-items:center;gap:10px;
      }
      .section-label::after{
        content:'';flex:1;height:1px;
        background:linear-gradient(90deg,rgba(200,167,93,0.25),transparent);
      }

      /* ══ QUESTÃO CARD ══ */
      .q-card{
        background:linear-gradient(160deg,#070e1a 0%,#090f1f 100%);
        border:1px solid rgba(200,167,93,0.12);border-radius:16px;
        box-shadow:0 4px 28px rgba(0,0,0,0.5),0 1px 0 rgba(200,167,93,0.06) inset;
        overflow:hidden;
      }
      .q-header{
        background:linear-gradient(90deg,rgba(10,20,44,0.95) 0%,rgba(14,26,52,0.7) 100%);
        border-bottom:1px solid rgba(200,167,93,0.12);
        padding:10px 16px;
      }

      /* ══ ALTERNATIVAS ══ */
      .alt-item{
        background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);
        border-radius:10px;transition:all .18s ease;cursor:pointer;
        display:flex;align-items:flex-start;gap:12px;padding:11px 14px;
      }
      .alt-item:hover{
        background:rgba(200,167,93,0.06);border-color:rgba(200,167,93,0.22);
      }
      .alt-item.correct{
        background:rgba(34,100,50,0.12);border-color:rgba(60,180,80,0.35);
      }
      .alt-item.wrong{
        background:rgba(160,30,30,0.1);border-color:rgba(220,60,60,0.35);
      }
      .alt-item.selected{
        background:rgba(200,167,93,0.08);border-color:rgba(200,167,93,0.35);
      }
      .alt-letter{
        width:28px;height:28px;border-radius:8px;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;
        font-weight:800;font-size:13px;font-family:var(--font-h);
        transition:all .18s;
      }

      /* ══ TEXTO DE APOIO ══ */
      .fcc-apoio-wrap{
        background:rgba(8,16,34,0.8);
        border:1px solid rgba(200,167,93,0.14);border-left:3px solid rgba(200,167,93,0.5);
        border-radius:0 12px 12px 0;padding:14px 18px 12px;
        position:relative;
      }
      .fcc-apoio-wrap::before{
        content:'';position:absolute;top:0;left:3px;right:0;height:1px;
        background:linear-gradient(90deg,rgba(200,167,93,0.3),transparent);
      }
      .fcc-apoio-titulo{
        text-align:center;font-weight:700;color:var(--text1);font-size:13px;
        margin-bottom:10px;line-height:1.45;font-family:var(--font-h);letter-spacing:.5px;
      }
      .fcc-apoio-titulo em{font-style:italic!important}
      /* CORPO DO TEXTO DE APOIO — preserva estrutura literal do PDF */
      /* APOIO BODY — fluxo de prosa natural, parágrafos com respiro editorial */
      .fcc-apoio-body{
        color:var(--text2);font-size:13.5px;line-height:1.78;
        font-family:var(--font-b);word-wrap:break-word;
      }
      .fcc-apoio-body p{margin:0 0 1em;line-height:1.78;font-style:italic}
      .fcc-apoio-body p:last-child{margin-bottom:0}
      .fcc-apoio-body p+p{margin-top:0}
      /* MARK — grifo amarelo FCC (cor da imagem de referência) */
      .fcc-apoio-body mark, .fcc-pergunta mark, .fcc-alt-text mark{
        background:#d9a441;
        color:#1a1108;
        padding:1px 4px;border-radius:2px;
        text-decoration:none;font-style:inherit;
        box-decoration-break:clone;-webkit-box-decoration-break:clone;
      }
      .fcc-apoio-body em,.fcc-apoio-body i{font-style:italic!important;color:inherit}
      /* <strong> inline no apoio = negrito puro (idêntico ao original)
         Grifos amarelos ficam apenas em <mark> — detectados via pdfplumber */
      .fcc-apoio-body strong,.fcc-apoio-body b{
        font-weight:700!important;
      }
      
      /* Atribuições/fontes ("(Autor)", "(Adaptado de:...)") — alinhadas à direita, em itálico discreto */
      .fcc-apoio-body .apoio-attrib{
        display:block;text-align:right;margin-top:6px;
        font-size:.9em;color:var(--text3);font-style:italic;
      }
      /* Título centralizado dentro do apoio (poemas, contos) — SEM highlight */
      .fcc-apoio-body center.apoio-title,
      .fcc-apoio-body .apoio-title{
        display:block;text-align:center;
        margin:0 auto 8px;padding:0;
      ;font-style:normal}
      .fcc-apoio-body center.apoio-title strong,
      .fcc-apoio-body .apoio-title strong{
        font-weight:700!important;
        background:transparent!important;
        color:var(--text1)!important;
        padding:0!important;font-size:1.05em;
        letter-spacing:.3px;
      }
      .fcc-apoio-body u{text-decoration:underline!important;text-underline-offset:3px}
      /* Parágrafos dentro do apoio */
      .fcc-apoio-body p{margin:0 0 .65em;white-space:normal}
      .fcc-apoio-body p:last-child{margin-bottom:0}
      /* Quando o apoio NÃO usa pre-wrap (tem HTML <p>) */
      
      .fcc-apoio-body.prose br{display:block;margin-bottom:.1em}
      .fcc-apoio-body.prose br+br{margin-top:.4em}

      /* Trecho de referência (excerpt após atribuição — o que a questão analisa) */
      .fcc-apoio-body p.fcc-excerpt{
        margin-top:14px;
        padding:10px 14px;
        border-top:1px solid rgba(200,167,93,0.2);
        border-left:2px solid rgba(200,167,93,0.4);
        border-radius:0 6px 6px 0;
        background:rgba(200,167,93,0.04);
        font-style:normal;
        line-height:1.75;
      }
      /* <u> dentro do excerpt = sublinhado confirmado do PDF */
      .fcc-apoio-body p.fcc-excerpt u{
        text-decoration:underline!important;
        text-underline-offset:3px;
        font-style:inherit;
      }
      /* <em> dentro do excerpt = itálico genuíno */
      .fcc-apoio-body p.fcc-excerpt em{
        font-style:italic!important;
      }

      /* Verso/Poema — linhas com quebra de linha explícita */
      .fcc-apoio-body .fcc-verse{
        display:block;line-height:1.8;margin:0 0 .85em;
        font-family:var(--font-b);
      ;font-style:italic}
      .fcc-apoio-body .fcc-verse br{display:block;margin:0}

      /* ══ DIVISOR apoio ↔ pergunta ══ */
      .fcc-apoio-pergunta-divider{
        height:1px;margin:14px 0 12px;
        background:linear-gradient(90deg,rgba(200,167,93,0.28),transparent);
      }

      /* ══ PERGUNTA PRINCIPAL ══ */
      .fcc-pergunta-wrap{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid rgba(255,255,255,0.05)}
      .fcc-pergunta{color:var(--text1);font-size:13.5px;line-height:1.72;word-break:break-word}
      .fcc-pergunta em{font-style:italic!important}
      .fcc-pergunta strong,.fcc-pergunta b{font-weight:700!important}
      .fcc-pergunta u{text-decoration:underline!important;text-underline-offset:3px}
      .fcc-pergunta br{display:block}
      .fcc-pergunta br+br{margin-top:.4em}

      /* ══ ALTERNATIVAS TEXTO ══ */
      .fcc-alt-text{font-size:13px;line-height:1.6;flex:1;word-break:break-word}
      .fcc-alt-text em,.fcc-alt-text i{font-style:italic!important}
      .fcc-alt-text strong,.fcc-alt-text b{font-weight:700!important}
      .fcc-alt-text u{text-decoration:underline!important;text-underline-offset:3px;color:inherit}

      /* ══ HTML BASE ══ */
      .fcc-html em,.fcc-html i{font-style:italic!important}
      .fcc-html strong,.fcc-html b{font-weight:700!important}
      .fcc-html u{text-decoration:underline!important;text-underline-offset:3px}
      .fcc-html p{margin:0 0 .5em;line-height:1.65}
      .fcc-html p:last-child{margin-bottom:0}
      .fcc-html center{text-align:center;display:block}
      .fcc-html blockquote{margin:.35em 0 .35em 1.5em;padding-left:.6em;border-left:2px solid rgba(200,167,93,0.25);font-style:italic}
      .fcc-html ul,.fcc-html ol{margin:.3em 0 .3em 1.3em}
      .fcc-html li{margin-bottom:.15em;line-height:1.6}
      .fcc-html table{border-collapse:collapse;width:100%;margin:.45em 0}
      .fcc-html th,.fcc-html td{border:1px solid rgba(255,255,255,0.12);padding:4px 8px}
      .fcc-html th{font-weight:700;background:rgba(200,167,93,0.07)}

      /* ══ IMAGENS ══ */
      .fcc-q-img-wrap{text-align:center;margin:10px 0 12px}
      .fcc-q-img{
        display:block;max-width:100%;height:auto;margin:0 auto;
        border-radius:10px;border:1px solid rgba(200,167,93,0.14);
        object-fit:contain;max-height:460px;box-shadow:0 4px 20px rgba(0,0,0,0.45);
      }

      /* ══ PROGRESSO ══ */
      .prog-track{background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
      .prog-fill{
        height:100%;border-radius:3px;
        background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold2));
        box-shadow:0 0 8px rgba(200,167,93,0.35);
        transition:width .5s cubic-bezier(.4,0,.2,1);
      }

      /* ══ ANIMAÇÕES ══ */
      @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(200,167,93,0)}50%{box-shadow:0 0 0 8px rgba(200,167,93,0.06)}}
      @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
      .fade-up{animation:fadeUp .35s ease forwards}

      /* ══ DESKTOP+ ══ */
      @media(min-width:900px){.kbd-hints{display:inline-flex!important}}

      /* ══ MOBILE ══ */
      @media(max-width:640px){
        .fcc-apoio-body{font-size:12.5px}
        .fcc-pergunta{font-size:13px}
        .fcc-alt-text{font-size:12.5px}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
