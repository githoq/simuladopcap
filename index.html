<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/shield.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c1a" />
    <meta name="description" content="Plataforma de Simulados — Polícia Civil do Amapá — FCC" />
    <title>PC-AP Simulados</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { min-height: 100vh; background: #080c1a; color: #e2e8f0; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

      /* ═══════════════════════════════════════════
         BASE — todas as classes fcc-html
      ═══════════════════════════════════════════ */
      .fcc-html em, .fcc-html i         { font-style: italic !important; }
      .fcc-html strong, .fcc-html b     { font-weight: 700 !important; }
      .fcc-html u                        { text-decoration: underline !important; text-underline-offset: 2px; }
      .fcc-html s, .fcc-html del        { text-decoration: line-through; }
      .fcc-html sup                      { vertical-align: super; font-size: .75em; }
      .fcc-html sub                      { vertical-align: sub;   font-size: .75em; }
      .fcc-html p                        { margin: 0 0 .55em; line-height: 1.65; }
      .fcc-html p:last-child             { margin-bottom: 0; }
      .fcc-html br                       { display: block; }
      .fcc-html br + br                  { margin-top: .4em; }
      .fcc-html blockquote               { margin: .4em 0 .4em 1.6em; padding-left: .7em;
                                           border-left: 2px solid rgba(255,255,255,.16); font-style: italic; }
      .fcc-html ul, .fcc-html ol        { margin: .35em 0 .35em 1.4em; }
      .fcc-html li                       { margin-bottom: .15em; line-height: 1.6; }
      .fcc-html center, .fcc-html .centro { text-align: center; display: block; }
      .fcc-html table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size: .9em; }
      .fcc-html th, .fcc-html td { border: 1px solid rgba(255,255,255,.17); padding: 4px 8px; }
      .fcc-html th { font-weight: 700; background: rgba(255,255,255,.05); }

      /* ═══════════════════════════════════════════
         TEXTO DE APOIO — bloco literário
      ═══════════════════════════════════════════ */
      .fcc-apoio-wrap {
        background: rgba(22, 50, 90, 0.45);
        border: 1px solid rgba(56,189,248,.22);
        border-left: 3px solid #38bdf8;
        border-radius: 0 10px 10px 0;
        padding: 12px 16px 10px;
      }
      .fcc-apoio-titulo {
        text-align: center; font-weight: 700; color: #e2e8f0;
        font-size: 13px; margin-bottom: 8px; line-height: 1.4;
      }
      .fcc-apoio-titulo em, .fcc-apoio-titulo i     { font-style: italic !important; }
      .fcc-apoio-titulo strong, .fcc-apoio-titulo b { font-weight: 700 !important; }

      .fcc-apoio-body {
        color: #b8c5d6; font-size: 13px; line-height: 1.62;
      }
      .fcc-apoio-body em, .fcc-apoio-body i     { font-style: italic !important; color: inherit; }
      /* strong no apoio = grifado/highlight FCC */
      .fcc-apoio-body strong, .fcc-apoio-body b {
        font-weight: 700 !important;
        background: rgba(251,210,60,.22);
        border-radius: 2px; padding: 0 2px;
        color: #e8d87a;
      }
      .fcc-apoio-body u  { text-decoration: underline !important; text-underline-offset: 2px; }
      .fcc-apoio-body p  { margin: 0 0 .5em; }
      .fcc-apoio-body p:last-child { margin-bottom: 0; }
      /* verse/poem: preserve line breaks visually */
      .fcc-apoio-body br { display: block; }

      /* ═══════════════════════════════════════════
         SEPARADOR apoio ↔ pergunta
      ═══════════════════════════════════════════ */
      .fcc-apoio-pergunta-divider {
        height: 1px;
        background: linear-gradient(to right, rgba(56,189,248,.3), transparent);
        margin: 14px 0 12px;
      }

      /* ═══════════════════════════════════════════
         PERGUNTA PRINCIPAL
      ═══════════════════════════════════════════ */
      .fcc-pergunta-wrap {
        margin-bottom: 13px; padding-bottom: 13px;
        border-bottom: 1px solid rgba(255,255,255,.06);
      }
      .fcc-pergunta {
        color: #f1f5f9; font-size: 13.5px; line-height: 1.7;
        word-break: break-word;
      }
      .fcc-pergunta em, .fcc-pergunta i     { font-style: italic !important; }
      .fcc-pergunta strong, .fcc-pergunta b { font-weight: 700 !important; }
      .fcc-pergunta u { text-decoration: underline !important; text-underline-offset: 2px; }
      .fcc-pergunta p { margin: 0 0 .45em; }

      /* ═══════════════════════════════════════════
         ALTERNATIVAS
         <em>  = expressão sublinhada (underline)
         <u>   = sublinhado direto do PDF (underline)
         <strong> = negrito (bold)
      ═══════════════════════════════════════════ */
      .fcc-alt-text {
        font-size: 13px; line-height: 1.6;
        flex: 1; padding-top: 2px; word-break: break-word;
      }
      /* CRITICAL: em em alternativa = sublinhado original FCC */
      .fcc-alt-text em, .fcc-alt-text i {
        font-style: normal !important;
        text-decoration: underline !important;
        text-underline-offset: 2px;
        text-decoration-color: rgba(200,214,229,.8);
      }
      .fcc-alt-text strong, .fcc-alt-text b { font-weight: 700 !important; }
      .fcc-alt-text u {
        text-decoration: underline !important;
        text-underline-offset: 2px;
        font-style: normal;
      }
      .fcc-alt-text p { margin: 0; }

      /* ═══════════════════════════════════════════
         IMAGENS
      ═══════════════════════════════════════════ */
      .fcc-q-img-wrap { text-align: center; margin: 10px 0 12px; }
      .fcc-q-img {
        display: block; max-width: 100%; height: auto; margin: 0 auto;
        border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
        object-fit: contain; max-height: 480px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
